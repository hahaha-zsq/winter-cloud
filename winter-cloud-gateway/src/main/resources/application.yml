server:
  port: 9997
spring:
  application:
    name: winter-cloud-gateway
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848  # Nacos 服务器地址
        namespace: 29d945aa-f370-4c9a-bc05-74bb2831e5ae  # 命名空间（可选，用于环境隔离）
        group: DEFAULT_GROUP  # 分组（可选）
        username: nacos  # Nacos 用户名（如果开启了认证）
        password: nacos666!  # Nacos 密码（如果开启了认证）
    gateway:

      # 1. 全局跨域配置 (新增部分)
      globalcors:
        add-to-simple-url-handler-mapping: true # 解决 OPTIONS 请求被拦截问题
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: # 👈 注意是 patterns，不是 origins
              - "http://localhost:*"
            allowedMethods: "*"         # 允许所有方法
            allowedHeaders: "*"         # 允许所有头
            allowCredentials: true      # 允许携带 Cookie
      # 路由配置
      routes:
        # 认证服务路由
        - id: winter-cloud-auth
          uri: lb://winter-cloud-auth
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=2
            - name: Retry
              args:
                retries: 1  # 减少重试次数
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT
                methods: GET,POST
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
        # 字典服务路由
        - id: winter-cloud-dict
          uri: lb://winter-cloud-dict
          predicates:
            - Path=/api/dict/**
          filters:
            - StripPrefix=2
            - name: Retry
              args:
                retries: 1  # 减少重试次数
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT
                methods: GET,POST
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
        # 国际化服务路由
        - id: winter-cloud-i18n
          uri: lb://winter-cloud-i18n
          predicates:
            - Path=/api/i18n/**
          filters:
            - StripPrefix=2
            - name: Retry
              args:
                retries: 1  # 减少重试次数
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT
                methods: GET,POST
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
        # 文件服务路由
        - id: winter-cloud-file
          uri: lb://winter-cloud-file
          predicates:
            - Path=/api/file/**
          filters:
            - StripPrefix=2
            - name: Retry
              args:
                retries: 1  # 减少重试次数
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT
                methods: GET,POST
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
  redis:
    host: localhost
    port: 6379
    password: redis
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
# 白名单
gateway:
  auth:
    ignore-urls:
      - /api/auth/auth/login
      - /api/doc.html
      - /api/swagger-resources/**
# Dubbo 配置
dubbo:
  application:
    name: winter-cloud-gateway-dubbo
    qos-enable: true
    qos-port: 22223
    qos-accept-foreign-ip: false
  registry:
    address: nacos://localhost:8848
    parameters:
      namespace: 29d945aa-f370-4c9a-bc05-74bb2831e5ae
      group: DEFAULT_GROUP
      username: nacos
      password: nacos666!
  protocol:
    name: dubbo
    port: 20881
  consumer:
    timeout: 3000
    retries: 0
    check: false  # 启动时不检查提供者是否存在

winter-redis-config:
  # 系统名称，用于动态配置中心的命名空间隔离
  system: ${spring.application.name}

  # Redisson 连接配置
  redission:
    host: ${spring.redis.host}
    port: ${spring.redis.port}
    database: ${spring.redis.database}
    password: ${spring.redis.password}
    pool-size: 64            # 连接池大小
    min-idle-size: 10        # 最小空闲连接数
    idle-timeout: 10000      # 空闲连接超时时间（毫秒）
    connect-timeout: 10000   # 连接超时时间（毫秒）
    retry-attempts: 3        # 重试次数
    retry-interval: 1500     # 重试间隔时间（毫秒）
    ping-interval: 30000     # Ping 连接间隔时间（毫秒）
    keep-alive: true         # 是否保持连接
logging:
  level:
    com.winter.cloud.gateway: debug
    com.baomidou.dynamic: debug  # 动态数据源日志
    reactor.netty: debug  # Netty日志
    org.springframework.cloud.gateway: debug  # Gateway日志
#    org.apache.dubbo: debug  # Dubbo日志
